<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Mood Diary</title>
  <link rel="stylesheet" href="styles2.css">
</head>
<body>
  <div class="container">
    <h1>Interactive Mood Journal</h1>
    <p>How are you feeling today?</p>
    
    <div class="mood-buttons">
      <button class="mood-btn" data-mood="happy">😊</button>
      <button class="mood-btn" data-mood="sad">😢</button>
      <button class="mood-btn" data-mood="excited">🤩</button>
      <button class="mood-btn" data-mood="tired">😴</button>
    </div>

    <div class="suggestions">
      <h2>Activity suggestions</h2>
      <p id="suggestion">Select a mood for personalized suggestions!</p>
    </div>

    <div class="history">
      <h2>Humor history</h2>
      <ul id="history-list">
        
      </ul>
    </div>
  </div>

  <script src="script2.js"></script>
</body>
</html>
