<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diário de Humor Interativo</title>
  <link rel="stylesheet" href="styles2.css">
</head>
<body>
  <div class="container">
    <h1>Diário de Humor Interativo</h1>
    <p>Como você está se sentindo hoje?</p>
    
    <div class="mood-buttons">
      <button class="mood-btn" data-mood="happy">😊</button>
      <button class="mood-btn" data-mood="sad">😢</button>
      <button class="mood-btn" data-mood="excited">🤩</button>
      <button class="mood-btn" data-mood="tired">😴</button>
    </div>

    <div class="suggestions">
      <h2>Sugestões de atividades</h2>
      <p id="suggestion">Selecione um humor para sugestões personalizadas!</p>
    </div>

    <div class="history">
      <h2>Histórico de Humor</h2>
      <ul id="history-list">
        
      </ul>
    </div>
  </div>

  <script src="script2.js"></script>
</body>
</html>
